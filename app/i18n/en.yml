help: "🤖 <b>What I can do</b>\n\n🔍 /search — browse opportunities with filters\nTap a filter to cycle its value, then «▶️ Run search».\n<i>Example: Field: Data Science → Degree: undergrad → Deadline: 30 days → ▶️</i>\n\n⭐ /saved — your bookmarks & deadline reminders\nTap «⭐ Save» on any post. I'll remind you 7, 3 and 1 days before each deadline. After you apply, tap «✅ Applied» — later I'll ask how it went.\n\n💾 /filters — saved searches & notifications\nIn /search tap «💾 Save this filter» and name it (e.g. «ML internships EU»). New matching posts arrive as DMs; toggle with 🔔/🔕.\n\n📎 /mydocs — resume & documents\nUpload your resume (PDF/DOCX/TXT) to unlock «📊 Analyze my fit»: match score, gaps, and sample resume bullets for any opportunity.\n\n👤 /profile — view your profile or redo onboarding\n🌐 /language — English ⇄ Հայերեն\n\n💡 <b>Tip:</b> forward me any post from our channels — I'll show the full details, 🇦🇲 eligibility, the English requirement checked against your score, and your personal fit analysis."
