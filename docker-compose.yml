services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    ports:
      - "8080:8080"   # only used in webhook mode (/health endpoint)
    volumes:
      - hf_cache:/app/hf_cache

  # Pure-offline profile: `docker compose --profile localdb up`
  # and set DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/moonin
  db:
    image: pgvector/pgvector:pg16
    profiles: ["localdb"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moonin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  hf_cache:
