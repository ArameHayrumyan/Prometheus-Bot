# Render Blueprint — free web service, bot in POLLING mode (split: scraping
# runs from the operator's machine or GitHub Actions). Polling needs no
# webhook URL/secret; the app binds a /health port so the web service starts,
# and the cron-job.org keep-alive ping keeps it awake for reminders/digest.
services:
  - type: web
    name: moonin-opportunities-bot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: USE_WEBHOOK
        value: "false"   # polling: no webhook URL/secret needed
      - key: PLAYWRIGHT_ENABLED
        value: "false"   # 512MB free instance; scraping happens off-box anyway
      - key: RUN_SCRAPER_JOBS
        value: "false"   # split mode: scraping via scraper_cli (local / GH Actions)
      - key: PORT
        value: "8080"
      - key: TZ
        value: Asia/Yerevan
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID_MAIN
        sync: false     # the unified channel: -100... or -100...:topic_id
      - key: ADMIN_USER_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NEWSLETTER_IMAP_HOST
        sync: false
      - key: NEWSLETTER_IMAP_USER
        sync: false
      - key: NEWSLETTER_IMAP_PASSWORD
        sync: false
      - key: SCRAPER_PROXY_URL
        sync: false
      - key: LINKEDIN_PROXY_URL
        sync: false
